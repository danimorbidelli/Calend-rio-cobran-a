# Blueprint de deploy no Render (https://render.com)
# Para criar tudo de uma vez: New + > Blueprint > aponte para este repositório.
#
# Persistência dos dados:
#  - Por padrão usa um banco PostgreSQL gerenciado (durável), criado aqui
#    mesmo pelo blueprint, e injetado no app via DATABASE_URL.
#  - Se preferir não usar banco (modo arquivo), remova o bloco "databases" e a
#    envVar DATABASE_URL: o app cai automaticamente no arquivo JSON local
#    (efêmero no plano free).
databases:
  - name: calendario-db
    plan: free

services:
  - type: web
    name: calendario-cobranca
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calendario-db
          property: connectionString

