<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendário de Cobrança — Movimento Hora a Hora</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #273449; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --accent-2: #0ea5e9;
    --ok: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  header.app-header { background: linear-gradient(135deg, #0ea5e9, #6366f1); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
  header.app-header h1 { margin: 0; font-size: 20px; }
  header.app-header .subtitle { font-size: 12px; opacity: .85; margin-top: 2px; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  button { cursor: pointer; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 13px; transition: .15s; }
  button:hover { background: #344155; }
  button.primary { background: var(--accent-2); border-color: var(--accent-2); color: #04263a; font-weight: 600; }
  button.primary:hover { background: var(--accent); }
  button.ghost { background: transparent; }
  button.danger { background: var(--danger); border-color: var(--danger); color: #fff; }

  .conn { font-size: 12px; padding: 4px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
  .conn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .conn.online { background: rgba(34,197,94,.18); color: #bbf7d0; }
  .conn.offline { background: rgba(245,158,11,.18); color: #fde68a; }
  .conn.online .dot { background: var(--ok); }
  .conn.offline .dot { background: var(--warn); }

  .view-switch { display: flex; gap: 4px; background: rgba(0,0,0,.2); padding: 3px; border-radius: 10px; }
  .view-switch button { border: none; background: transparent; padding: 6px 14px; }
  .view-switch button.active { background: rgba(255,255,255,.18); font-weight: 600; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; padding: 16px 24px; max-width: 1600px; margin: 0 auto; }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card h3 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }

  .date-nav { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
  .date-nav input[type="date"] { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; flex: 1; }
  .current-date-label { font-size: 16px; font-weight: 600; margin: 8px 0 0; }
  .weekday-label { color: var(--muted); font-size: 12px; text-transform: capitalize; }

  .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; cursor: pointer; border-radius: 6px; }
  .filter-item:hover { background: var(--panel-2); }
  .dot12 { width: 12px; height: 12px; border-radius: 50%; flex: none; }
  .filter-item.off { opacity: .4; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric { background: var(--panel-2); border-radius: 10px; padding: 10px; text-align: center; }
  .metric .value { font-size: 22px; font-weight: 700; }
  .metric .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

  .panel-main { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel-2); flex-wrap: wrap; gap: 8px; }

  /* ---- Grid com posicionamento por horário (Dia) ---- */
  .cal-day-grid { position: relative; }
  .cg-label { position: absolute; left: 0; width: 56px; text-align: right; padding-right: 8px; font-size: 11px; color: var(--muted); transform: translateY(-6px); }
  .cg-line { position: absolute; left: 64px; right: 0; border-top: 1px solid var(--border); }
  .cg-area { position: absolute; left: 64px; right: 8px; top: 0; bottom: 0; }

  /* ---- Semana ---- */
  .week-grid { overflow-x: auto; }
  .wk { min-width: 920px; }
  .wk-head { display: grid; grid-template-columns: 52px repeat(7, 1fr); }
  .wk-corner { }
  .wk-h { text-align: center; padding: 8px 4px; font-size: 12px; border-left: 1px solid var(--border); cursor: pointer; }
  .wk-h.today { color: var(--accent); font-weight: 700; }
  .wk-h small { display: block; color: var(--muted); }
  .wk-body { position: relative; }
  .wk-glabel { position: absolute; left: 0; width: 46px; text-align: right; padding-right: 6px; font-size: 11px; color: var(--muted); transform: translateY(-6px); }
  .wk-line { position: absolute; left: 52px; right: 0; border-top: 1px solid var(--border); }
  .wk-cols { position: absolute; left: 52px; right: 0; top: 0; bottom: 0; display: grid; grid-template-columns: repeat(7, 1fr); }
  .wk-col { position: relative; border-left: 1px solid var(--border); }

  /* ---- Card de evento (posicionado) ---- */
  .ev { position: absolute; border-radius: 7px; color: #fff; padding: 4px 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.35); cursor: pointer; border-left: 3px solid rgba(0,0,0,.25); }
  .ev-time { font-size: 10px; opacity: .9; }
  .ev-title { font-weight: 700; font-size: 12px; line-height: 1.25; padding-right: 64px; }
  .ev-meta { font-size: 10px; opacity: .92; }
  .ev.done { opacity: .5; }
  .ev.done .ev-title { text-decoration: line-through; }
  .ev-done { position: absolute; top: 4px; right: 4px; font-size: 10px; padding: 1px 7px; border-radius: 6px; border: 1px solid rgba(255,255,255,.55); background: rgba(0,0,0,.22); color: #fff; }
  .ev-done:hover { background: rgba(0,0,0,.4); }
  .ev.done .ev-done { background: var(--ok); border-color: var(--ok); color: #04250f; font-weight: 700; }

  /* ---- Mês ---- */
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .month-dow { padding: 8px; text-align: center; font-size: 12px; color: var(--muted); background: var(--panel-2); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .5px; }
  .month-cell { min-height: 96px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; cursor: pointer; }
  .month-cell:hover { background: rgba(56,189,248,.06); }
  .month-cell.dim { opacity: .35; }
  .month-cell.today { box-shadow: inset 0 0 0 2px var(--accent); }
  .month-day-num { font-weight: 600; font-size: 13px; }
  .month-badges { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .month-badge { font-size: 10px; padding: 1px 6px; border-radius: 5px; color: #fff; display: inline-flex; justify-content: space-between; gap: 6px; }

  /* Modal / overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 540px; max-height: 90vh; overflow: auto; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); }
  .modal-head h2 { margin: 0; font-size: 17px; }
  .modal-body { padding: 20px; display: grid; gap: 14px; }
  .modal-foot { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; position: sticky; bottom: 0; background: var(--panel); }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input, .field select, .field textarea { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 9px 10px; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .field textarea { resize: vertical; min-height: 64px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chk { display: flex; gap: 8px; align-items: center; font-size: 14px; }
  .chk input { width: 18px; height: 18px; }
  .close-x { background: transparent; border: none; font-size: 22px; color: var(--muted); padding: 0 4px; }

  /* ---- Painel de Pitches padrão ---- */
  .pitch-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .pitch-tab { font-size: 13px; }
  .pitch-tab.active { background: var(--accent-2); color: #04263a; border-color: var(--accent-2); font-weight: 600; }
  .pp-rules { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .pp-rules { grid-template-columns: 1fr; } }
  .pp-rule { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--panel-2); }
  .pp-rule .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 6px; }
  .pp-rule.no .lbl { color: #fca5a5; }
  .pp-rule.yes .lbl { color: #86efac; }
  .pp-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; }
  .pp-order { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; counter-reset: step; }
  @media (max-width: 600px) { .pp-order { grid-template-columns: 1fr; } }
  .pp-order .step { background: var(--panel-2); border-left: 3px solid var(--accent); border-radius: 8px; padding: 10px 12px; font-size: 13px; }
  .pp-order .step b { color: var(--accent); display: block; font-size: 18px; }
  .pp-pitch { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .pp-pitch .ph { background: var(--panel-2); padding: 10px 14px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
  .pp-pitch .pb { padding: 12px 14px; font-size: 14px; font-style: italic; color: var(--text); line-height: 1.6; }
  .pp-check { list-style: none; padding: 0; margin: 0; }
  .pp-check li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .pp-check li:last-child { border: none; }

  .footer-note { text-align: center; color: var(--muted); font-size: 12px; padding: 12px; }
  .hidden { display: none !important; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--panel-2); border: 1px solid var(--border); padding: 10px 18px; border-radius: 10px; z-index: 100; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header class="app-header">
  <div>
    <h1>📅 Calendário de Cobrança</h1>
    <div class="subtitle">Movimento hora a hora da equipe — pitches, objeções e volumetria</div>
  </div>
  <div class="toolbar">
    <span class="conn offline" id="connBadge"><span class="dot"></span><span id="connText">verificando…</span></span>
    <div class="view-switch" id="viewSwitch">
      <button data-view="day" class="active">Dia</button>
      <button data-view="week">Semana</button>
      <button data-view="month">Mês</button>
    </div>
    <button id="btnToday" class="ghost">Hoje</button>
    <button id="btnExport" class="ghost">⤓ Exportar</button>
    <button id="btnImport" class="ghost">⤒ Importar</button>
    <input type="file" id="fileImport" accept="application/json" class="hidden" />
    <button id="btnNew" class="primary">+ Nova atividade</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="card">
      <h3>Diretórios</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="lib-open primary" data-dir="pitch" style="width:100%">📋 Pitches</button>
        <button class="lib-open" data-dir="objecao" style="width:100%">⚠️ Objeções</button>
        <button class="lib-open" data-dir="estrategia" style="width:100%">🎯 Estratégias</button>
      </div>
    </div>

    <div class="card">
      <h3>Data</h3>
      <div class="date-nav">
        <button id="btnPrev" class="ghost">‹</button>
        <input type="date" id="datePicker" />
        <button id="btnNext" class="ghost">›</button>
      </div>
      <div class="current-date-label" id="currentDateLabel">—</div>
      <div class="weekday-label" id="weekdayLabel"></div>
    </div>

    <div class="card">
      <h3 id="summaryTitle">Resumo</h3>
      <div class="metrics">
        <div class="metric"><div class="value" id="mTotal">0</div><div class="label">Atividades</div></div>
        <div class="metric"><div class="value" id="mDone">0</div><div class="label">Concluídas</div></div>
        <div class="metric"><div class="value" id="mPitch">0</div><div class="label">Pitches</div></div>
        <div class="metric"><div class="value" id="mObj">0</div><div class="label">Objeções</div></div>
        <div class="metric"><div class="value" id="mVol">0</div><div class="label">Volumetria</div></div>
      </div>
    </div>

    <div class="card">
      <h3>Filtrar / Categorias</h3>
      <div id="filters"></div>
    </div>

    <div class="card">
      <h3>Equipe (filtro)</h3>
      <div class="field">
        <select id="teamFilter"><option value="">Todos os responsáveis</option></select>
      </div>
    </div>
  </aside>

  <main>
    <div class="panel-main">
      <div class="panel-head">
        <strong id="panelTitle">Agenda</strong>
        <div id="hourRangeControls" style="display:flex;gap:8px;align-items:center;">
          <label style="font-size:12px;color:var(--muted)">Início</label>
          <select id="startHour"></select>
          <label style="font-size:12px;color:var(--muted)">Fim</label>
          <select id="endHour"></select>
        </div>
      </div>
      <div id="viewDay" style="padding:12px 16px"></div>
      <div id="viewWeek" class="hidden week-grid" style="padding:12px 8px"></div>
      <div id="viewMonth" class="hidden"></div>
    </div>
    <div class="footer-note" id="footerNote"></div>
  </main>
</div>

<!-- Modal de atividade -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Nova atividade</h2>
      <button class="close-x" id="btnCloseModal">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="evId" />
      <div class="grid-2">
        <div class="field"><label>Data</label><input type="date" id="evDate" /></div>
        <div class="field"><label>Categoria</label><select id="evCat"></select></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Início</label><input type="time" id="evStart" step="60" /></div>
        <div class="field"><label>Fim (opcional)</label><input type="time" id="evEnd" step="60" /></div>
      </div>
      <div class="field">
        <label>Título da atividade</label>
        <input type="text" id="evTitle" placeholder="Ex.: Bloco de ligações — carteira 30 dias" />
      </div>
      <div class="field">
        <label>Responsável</label>
        <select id="evOwnerPick"><option value="">— escolher da equipe —</option></select>
        <input type="text" id="evOwner" placeholder="ou digite um nome" list="ownerList" style="margin-top:6px" />
        <datalist id="ownerList"></datalist>
      </div>
      <div class="field">
        <label>Volumetria (qtd.)</label>
        <input type="number" id="evVolume" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label>Pitch utilizado</label>
        <textarea id="evPitch" placeholder="Roteiro / abordagem aplicada"></textarea>
        <button type="button" id="evPitchToLib" class="ghost" style="font-size:11px;padding:4px 8px;align-self:flex-start">→ Salvar em Pitches</button>
      </div>
      <div class="field">
        <label>Objeções registradas</label>
        <textarea id="evObjections" placeholder="Principais objeções e contornos"></textarea>
        <button type="button" id="evObjToLib" class="ghost" style="font-size:11px;padding:4px 8px;align-self:flex-start">→ Salvar em Objeções</button>
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea id="evNotes" placeholder="Resultados, metas, anotações livres"></textarea>
        <button type="button" id="evNotesToLib" class="ghost" style="font-size:11px;padding:4px 8px;align-self:flex-start">→ Salvar em Estratégias</button>
      </div>
      <label class="chk"><input type="checkbox" id="evDone" /> Atividade concluída</label>
      <label class="chk"><input type="checkbox" id="evSummaryOnly" /> Somente resumo (não exibir no calendário)</label>
    </div>
    <div class="modal-foot">
      <button id="btnDelete" class="danger">Excluir</button>
      <div style="display:flex;gap:8px;">
        <button id="btnCancel" class="ghost">Cancelar</button>
        <button id="btnSave" class="primary">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- Biblioteca (diretórios) -->
<div class="overlay" id="libOverlay">
  <div class="modal" style="max-width:820px">
    <div class="modal-head">
      <h2 id="libTitle">Biblioteca</h2>
      <button class="close-x" id="closeLib">×</button>
    </div>
    <div class="modal-body">
      <div class="pitch-tabs" id="libTabs"></div>
      <div id="libList"></div>
      <div class="pp-section-label" id="libFormLabel">Incluir novo item</div>
      <input type="hidden" id="libEditId" />
      <div class="field"><label>Título</label><input id="libNewTitle" type="text" placeholder="Título do item" /></div>
      <div class="field"><label>Conteúdo</label><textarea id="libNewBody" placeholder="Texto para consulta (pitch, tratamento de objeção ou estratégia)"></textarea></div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button id="libCancelEdit" class="ghost hidden">Cancelar edição</button>
        <button id="libAdd" class="primary">+ Incluir no diretório</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const PREFS_KEY = "calendario_cobranca_prefs_v3";
  const CACHE_KEY = "calendario_cobranca_cache_v3";
  const LIB_CACHE_KEY = "calendario_cobranca_lib_v1";
  const ROW = 56;            // pixels por hora
  const DEFAULT_DUR = 30;    // minutos para evento sem fim definido

  const CATEGORIES = [
    { id: "pitch",      label: "Pitch",      color: "#6366f1" },
    { id: "objecao",    label: "Objeção",    color: "#f59e0b" },
    { id: "volumetria", label: "Volumetria", color: "#10b981" },
    { id: "movimento",  label: "Movimento",  color: "#38bdf8" },
    { id: "reuniao",    label: "Reunião",    color: "#a855f7" },
    { id: "outro",      label: "Outro",      color: "#64748b" },
  ];
  const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

  // Responsáveis da equipe (para escolher no card)
  const ROSTER = [
    { group: "Liderança DW — Marília / Doutores", names: ["Ingrid Sampaio dos Santos", "Larissa da Silva Pereira", "Kelly Barroso Vitor", "Jessica dos Santos Pimenta", "Jessica Vitoria Dutra", "Kamily Patrocinio Guilherme", "Thaina Costa Araujo", "Ana Clara Andrade Ramos", "Thayna Lasnaux", "Gustavo Nunes de Oliveira"] },
    { group: "Liderança Busca — Vitor / Busca", names: ["Gabriel Pereira de Carvalho", "Bruno da Silva Santana", "Leticia Cunha dos Santos", "Guilherme da Silva Sousa", "Larissa Vieira Coelho"] },
    { group: "Liderança Soluções — Guilherme / Soluções", names: ["Taiza Pinheiro Elias", "Shirley"] },
    { group: "Liderança MPI/IBS/CLI — Guilherme", names: ["Elisa de Paula Xavier"] },
  ];
  const ROSTER_NAMES = ROSTER.flatMap(g => g.names);

  // Diretórios da Biblioteca
  const DIRS = [
    { id: "pitch", label: "📋 Pitches" },
    { id: "objecao", label: "⚠️ Objeções" },
    { id: "estrategia", label: "🎯 Estratégias" },
  ];
  const DIR_MAP = Object.fromEntries(DIRS.map(d => [d.id, d]));

  let prefs = loadPrefs();
  let currentDate = todayStr();
  let view = "day";
  let events = [];
  let online = false;

  const el = (id) => document.getElementById(id);

  // ---------- Prefs ----------
  function loadPrefs() {
    try {
      const p = JSON.parse(localStorage.getItem(PREFS_KEY)) || {};
      return Object.assign({ startHour: 8, endHour: 18, hiddenCats: [], teamFilter: "" }, p);
    } catch (e) { return { startHour: 8, endHour: 18, hiddenCats: [], teamFilter: "" }; }
  }
  function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }

  // ---------- Datas / horários ----------
  const pad = (n) => String(n).padStart(2, "0");
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function parseDate(s) { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); }
  function toStr(dt) { return dt.toISOString().slice(0, 10); }
  function shiftDate(s, days) { const d = parseDate(s); d.setDate(d.getDate() + days); return toStr(d); }
  function startOfWeek(s) { const d = parseDate(s); d.setDate(d.getDate() - d.getDay()); return toStr(d); }
  function weekDates(s) { const start = startOfWeek(s); return Array.from({ length: 7 }, (_, i) => shiftDate(start, i)); }
  function fmtLong(s) { return parseDate(s).toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" }); }
  function fmtWeekday(s) { return parseDate(s).toLocaleDateString("pt-BR", { weekday: "long" }); }
  function fmtMonthYear(s) { return parseDate(s).toLocaleDateString("pt-BR", { month: "long", year: "numeric" }); }

  function toMin(hm) { const [h, m] = String(hm).split(":").map(Number); return h * 60 + (m || 0); }
  function minToHM(min) { min = Math.max(0, Math.min(24 * 60 - 1, min)); return pad(Math.floor(min / 60)) + ":" + pad(min % 60); }
  function startMinOf(e) { if (e.start) return toMin(e.start); if (e.hour != null) return Number(e.hour) * 60; return 9 * 60; }
  function endMinOf(e) { if (e.end) return toMin(e.end); return startMinOf(e) + DEFAULT_DUR; }
  function fmtRange(e) { const s = minToHM(startMinOf(e)); return e.end ? s + "–" + minToHM(endMinOf(e)) : s; }

  // ---------- API com fallback ----------
  async function api(path, opts) {
    const res = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
    if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || ("HTTP " + res.status)); }
    return res.json();
  }
  function loadCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || []; } catch (e) { return []; } }
  function saveCache(list) { localStorage.setItem(CACHE_KEY, JSON.stringify(list)); }

  async function checkHealth() { try { await api("/api/health"); setOnline(true); } catch (e) { setOnline(false); } }
  function setOnline(v) {
    online = v;
    el("connBadge").className = "conn " + (v ? "online" : "offline");
    el("connText").textContent = v ? "Servidor conectado" : "Offline (local)";
    el("footerNote").textContent = v
      ? "Conectado ao servidor — alterações são compartilhadas com toda a equipe."
      : "Sem servidor: usando armazenamento local deste navegador.";
  }

  function visibleRange() {
    if (view === "day") return [currentDate, currentDate];
    if (view === "week") { const w = weekDates(currentDate); return [w[0], w[6]]; }
    const d = parseDate(currentDate); const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const gridStart = parseDate(startOfWeek(toStr(first)));
    const gridEnd = new Date(gridStart); gridEnd.setDate(gridEnd.getDate() + 41);
    return [toStr(gridStart), toStr(gridEnd)];
  }

  async function loadEvents() {
    const [from, to] = visibleRange();
    if (online) {
      try {
        events = await api(`/api/events?from=${from}&to=${to}`);
        const cache = loadCache().filter(e => e.date < from || e.date > to);
        saveCache(cache.concat(events));
      } catch (e) { setOnline(false); events = loadCache().filter(e => e.date >= from && e.date <= to); }
    } else {
      events = loadCache().filter(e => e.date >= from && e.date <= to);
    }
  }
  async function persistCreate(ev) {
    if (online) { try { return await api("/api/events", { method: "POST", body: JSON.stringify(ev) }); } catch (e) { setOnline(false); } }
    const c = loadCache(); c.push(ev); saveCache(c); return ev;
  }
  async function persistUpdate(ev) {
    if (online) { try { return await api("/api/events/" + ev.id, { method: "PUT", body: JSON.stringify(ev) }); } catch (e) { setOnline(false); } }
    const c = loadCache(); const i = c.findIndex(e => e.id === ev.id); if (i >= 0) c[i] = ev; else c.push(ev); saveCache(c); return ev;
  }
  async function persistDelete(id) {
    if (online) { try { await api("/api/events/" + id, { method: "DELETE" }); return; } catch (e) { setOnline(false); } }
    saveCache(loadCache().filter(e => e.id !== id));
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  // ---------- Filtros ----------
  function passesFilter(e) { return !prefs.hiddenCats.includes(e.cat) && (!prefs.teamFilter || e.owner === prefs.teamFilter); }
  function eventsOn(date) { return events.filter(e => e.date === date && passesFilter(e)); }
  // atividades exibidas na grade (exclui registros "somente resumo")
  function gridEventsOn(date) { return eventsOn(date).filter(e => !e.summaryOnly); }
  function allOwners() {
    const set = new Set(ROSTER_NAMES);
    loadCache().concat(events).forEach(e => { if (e.owner) set.add(e.owner); });
    return [...set].sort();
  }

  // ---------- Sidebar ----------
  function renderFilters() {
    const wrap = el("filters"); wrap.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const div = document.createElement("div");
      div.className = "filter-item" + (prefs.hiddenCats.includes(cat.id) ? " off" : "");
      div.innerHTML = `<span class="dot12" style="background:${cat.color}"></span><span>${cat.label}</span>`;
      div.onclick = () => {
        const i = prefs.hiddenCats.indexOf(cat.id);
        if (i >= 0) prefs.hiddenCats.splice(i, 1); else prefs.hiddenCats.push(cat.id);
        savePrefs(); renderFilters(); render();
      };
      wrap.appendChild(div);
    });
  }
  function renderTeamFilter() {
    const sel = el("teamFilter"); const cur = prefs.teamFilter;
    sel.innerHTML = '<option value="">Todos os responsáveis</option>';
    allOwners().forEach(o => { const opt = document.createElement("option"); opt.value = o; opt.textContent = o; if (o === cur) opt.selected = true; sel.appendChild(opt); });
    const dl = el("ownerList"); dl.innerHTML = "";
    allOwners().forEach(o => { const opt = document.createElement("option"); opt.value = o; dl.appendChild(opt); });
  }

  function renderSummary() {
    const [from, to] = visibleRange();
    const list = events.filter(e => e.date >= from && e.date <= to && passesFilter(e));
    const cal = list.filter(e => !e.summaryOnly); // atividades no calendário
    el("summaryTitle").textContent = view === "day" ? "Resumo do dia" : view === "week" ? "Resumo da semana" : "Resumo do mês";
    el("mTotal").textContent = cal.length;
    el("mDone").textContent = cal.filter(e => e.done).length;
    el("mPitch").textContent = list.filter(e => e.cat === "pitch" || (e.pitch && e.pitch.trim())).length;
    el("mObj").textContent = list.filter(e => e.cat === "objecao" || (e.objections && e.objections.trim())).length;
    el("mVol").textContent = list.reduce((s, e) => s + (Number(e.volume) || 0), 0);
  }

  // ---------- Util ----------
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function fillHourSelect(select, selected) {
    select.innerHTML = "";
    for (let h = 0; h < 24; h++) { const o = document.createElement("option"); o.value = h; o.textContent = pad(h) + ":00"; if (h === selected) o.selected = true; select.appendChild(o); }
  }
  function divEl(cls, txt) { const d = document.createElement("div"); d.className = cls; if (txt != null) d.textContent = txt; return d; }

  // Distribui eventos sobrepostos em colunas
  function layoutColumns(items) {
    const evs = items.slice().sort((a, b) => a.s - b.s || a.e2 - b.e2);
    let clusterStart = 0, maxEnd = -1, colsEnd = [];
    const finalize = (a, b) => { const n = colsEnd.length || 1; for (let k = a; k < b; k++) evs[k].cols = n; };
    for (let n = 0; n < evs.length; n++) {
      const it = evs[n];
      if (n > clusterStart && it.s >= maxEnd) { finalize(clusterStart, n); clusterStart = n; colsEnd = []; maxEnd = -1; }
      let placed = false;
      for (let i = 0; i < colsEnd.length; i++) { if (colsEnd[i] <= it.s) { it.col = i; colsEnd[i] = it.e2; placed = true; break; } }
      if (!placed) { it.col = colsEnd.length; colsEnd.push(it.e2); }
      maxEnd = Math.max(maxEnd, it.e2);
    }
    finalize(clusterStart, evs.length);
    return evs;
  }

  function clickMin(ev, host) {
    const y = ev.offsetY;
    let min = prefs.startHour * 60 + Math.round((y / ROW * 60) / 15) * 15;
    return Math.max(prefs.startHour * 60, Math.min((prefs.endHour + 1) * 60 - 15, min));
  }

  function buildCard(e) {
    const cat = CAT_MAP[e.cat] || CAT_MAP.outro;
    const div = document.createElement("div");
    div.className = "ev" + (e.done ? " done" : "");
    div.style.background = cat.color;
    const meta = [];
    if (e.owner) meta.push("👤 " + escapeHtml(e.owner));
    if (e.volume) meta.push("📊 " + escapeHtml(String(e.volume)));
    div.innerHTML = `<div class="ev-time">${escapeHtml(fmtRange(e))} · ${escapeHtml(cat.label)}</div>` +
      `<div class="ev-title">${escapeHtml(e.title || "(sem título)")}</div>` +
      (meta.length ? `<div class="ev-meta">${meta.join(" · ")}</div>` : "");
    const btn = document.createElement("button");
    btn.className = "ev-done";
    btn.textContent = e.done ? "✓ Concluída" : "Concluir";
    btn.title = e.done ? "Concluída — clique para reabrir" : "Marcar como concluída";
    btn.onclick = (evt) => { evt.stopPropagation(); toggleDone(e); };
    div.appendChild(btn);
    div.onclick = (evt) => { evt.stopPropagation(); openModal(e); };
    return div;
  }

  function positionInto(container, dayEvents) {
    const gridStart = prefs.startHour * 60;
    const gridEnd = (prefs.endHour + 1) * 60;
    const items = dayEvents.map(e => {
      let s = startMinOf(e), en = endMinOf(e);
      if (en <= s) en = s + DEFAULT_DUR;
      return { e, s, e2: en };
    });
    layoutColumns(items).forEach(it => {
      const s = Math.max(it.s, gridStart), en = Math.min(it.e2, gridEnd);
      if (en <= gridStart || s >= gridEnd) return;
      const top = (s - gridStart) / 60 * ROW;
      const h = Math.max((en - s) / 60 * ROW, 22);
      const card = buildCard(it.e);
      card.style.top = top + "px";
      card.style.height = (h - 3) + "px";
      card.style.left = `calc(${(it.col / it.cols) * 100}% + 2px)`;
      card.style.width = `calc(${100 / it.cols}% - 4px)`;
      container.appendChild(card);
    });
  }

  async function toggleDone(e) {
    const updated = Object.assign({}, e, { done: !e.done });
    try { await persistUpdate(updated); await loadEvents(); render(); }
    catch (err) { alert("Erro ao atualizar: " + err.message); }
  }

  // ---------- Render ----------
  function render() {
    el("viewDay").classList.toggle("hidden", view !== "day");
    el("viewWeek").classList.toggle("hidden", view !== "week");
    el("viewMonth").classList.toggle("hidden", view !== "month");
    el("hourRangeControls").style.display = view === "month" ? "none" : "";
    renderTeamFilter();
    renderSummary();
    if (view === "day") renderDay();
    else if (view === "week") renderWeek();
    else renderMonth();
  }

  function renderDay() {
    el("panelTitle").textContent = "Agenda — " + fmtLong(currentDate);
    const host = el("viewDay"); host.innerHTML = "";
    const grid = divEl("cal-day-grid");
    grid.style.height = ((prefs.endHour - prefs.startHour + 1) * ROW) + "px";
    for (let h = prefs.startHour; h <= prefs.endHour; h++) {
      const top = (h - prefs.startHour) * ROW;
      const lab = divEl("cg-label", pad(h) + ":00"); lab.style.top = top + "px"; grid.appendChild(lab);
      const ln = divEl("cg-line"); ln.style.top = top + "px"; grid.appendChild(ln);
    }
    const area = divEl("cg-area");
    area.onclick = (ev) => { if (ev.target === area) openModal(null, { date: currentDate, start: minToHM(clickMin(ev, area)) }); };
    positionInto(area, gridEventsOn(currentDate));
    grid.appendChild(area);
    host.appendChild(grid);
  }

  function renderWeek() {
    const days = weekDates(currentDate);
    el("panelTitle").textContent = "Semana de " + fmtLong(days[0]) + " a " + fmtLong(days[6]);
    const host = el("viewWeek"); host.innerHTML = "";
    const wrap = divEl("wk");
    const head = divEl("wk-head");
    head.appendChild(divEl("wk-corner", ""));
    days.forEach(d => {
      const c = divEl("wk-h" + (d === todayStr() ? " today" : ""));
      const dt = parseDate(d);
      c.innerHTML = `${dt.toLocaleDateString("pt-BR", { weekday: "short" })}<small>${dt.getDate()}/${dt.getMonth() + 1}</small>`;
      c.onclick = () => { currentDate = d; setView("day"); };
      head.appendChild(c);
    });
    wrap.appendChild(head);

    const body = divEl("wk-body");
    body.style.height = ((prefs.endHour - prefs.startHour + 1) * ROW) + "px";
    for (let h = prefs.startHour; h <= prefs.endHour; h++) {
      const top = (h - prefs.startHour) * ROW;
      const lab = divEl("wk-glabel", pad(h) + "h"); lab.style.top = top + "px"; body.appendChild(lab);
      const ln = divEl("wk-line"); ln.style.top = top + "px"; body.appendChild(ln);
    }
    const cols = divEl("wk-cols");
    days.forEach(d => {
      const col = divEl("wk-col");
      col.onclick = (ev) => { if (ev.target === col) openModal(null, { date: d, start: minToHM(clickMin(ev, col)) }); };
      positionInto(col, gridEventsOn(d));
      cols.appendChild(col);
    });
    body.appendChild(cols);
    wrap.appendChild(body);
    host.appendChild(wrap);
  }

  function renderMonth() {
    el("panelTitle").textContent = "Mês — " + fmtMonthYear(currentDate);
    const host = el("viewMonth"); host.innerHTML = "";
    const grid = divEl("month-grid");
    ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"].forEach(d => grid.appendChild(divEl("month-dow", d)));
    const d = parseDate(currentDate); const month = d.getMonth();
    let cur = parseDate(startOfWeek(toStr(new Date(d.getFullYear(), month, 1))));
    for (let i = 0; i < 42; i++) {
      const ds = toStr(cur);
      const cell = divEl("month-cell" + (cur.getMonth() !== month ? " dim" : "") + (ds === todayStr() ? " today" : ""));
      cell.appendChild(divEl("month-day-num", cur.getDate()));
      const list = eventsOn(ds);
      if (list.length) {
        const badges = divEl("month-badges");
        const mk = (lbl, val, color) => { const b = divEl("month-badge"); b.style.background = color; b.innerHTML = `<span>${lbl}</span><span>${val}</span>`; return b; };
        badges.appendChild(mk("Ativid.", list.length, "#0ea5e9"));
        const vol = list.reduce((s, e) => s + (Number(e.volume) || 0), 0);
        if (vol) badges.appendChild(mk("Volum.", vol, "#10b981"));
        const done = list.filter(e => e.done).length;
        if (done) badges.appendChild(mk("Concl.", done, "#22c55e"));
        cell.appendChild(badges);
      }
      const dsCopy = ds;
      cell.onclick = () => { currentDate = dsCopy; setView("day"); };
      grid.appendChild(cell);
      cur.setDate(cur.getDate() + 1);
    }
    host.appendChild(grid);
  }

  // ---------- Modal CRUD ----------
  function openModal(event, preset) {
    preset = preset || {};
    el("modalTitle").textContent = event ? "Editar atividade" : "Nova atividade";
    el("evId").value = event ? event.id : "";
    el("evDate").value = event ? event.date : (preset.date || currentDate);
    el("evStart").value = event ? (event.start || minToHM(startMinOf(event))) : (preset.start || pad(prefs.startHour) + ":00");
    el("evEnd").value = event ? (event.end || "") : "";
    el("evCat").value = event ? event.cat : "movimento";
    el("evTitle").value = event ? (event.title || "") : "";
    el("evOwner").value = event ? (event.owner || "") : (prefs.teamFilter || "");
    el("evOwnerPick").value = "";
    el("evVolume").value = event ? (event.volume || "") : "";
    el("evPitch").value = event ? (event.pitch || "") : "";
    el("evObjections").value = event ? (event.objections || "") : "";
    el("evNotes").value = event ? (event.notes || "") : "";
    el("evDone").checked = event ? !!event.done : false;
    el("evSummaryOnly").checked = event ? !!event.summaryOnly : false;
    el("btnDelete").style.display = event ? "" : "none";
    el("overlay").classList.add("open");
    el("evTitle").focus();
  }
  function closeModal() { el("overlay").classList.remove("open"); }

  async function saveEvent() {
    const data = {
      id: el("evId").value || uid(),
      date: el("evDate").value,
      start: el("evStart").value,
      end: el("evEnd").value,
      cat: el("evCat").value,
      title: el("evTitle").value.trim(),
      owner: el("evOwner").value.trim(),
      volume: el("evVolume").value ? Number(el("evVolume").value) : "",
      pitch: el("evPitch").value.trim(),
      objections: el("evObjections").value.trim(),
      notes: el("evNotes").value.trim(),
      done: el("evDone").checked,
      summaryOnly: el("evSummaryOnly").checked,
    };
    if (!data.date) { alert("Informe a data."); return; }
    if (!data.start) { alert("Informe o horário de início."); return; }
    if (data.end && toMin(data.end) <= toMin(data.start)) { alert("O fim deve ser depois do início."); return; }
    if (!data.title) { alert("Informe um título para a atividade."); return; }
    data.hour = Number(data.start.split(":")[0]);
    try {
      if (el("evId").value) await persistUpdate(data); else await persistCreate(data);
      closeModal(); await loadEvents(); render(); toast("Atividade salva.");
    } catch (e) { alert("Erro ao salvar: " + e.message); }
  }

  async function deleteEvent() {
    const id = el("evId").value; if (!id) { closeModal(); return; }
    if (!confirm("Excluir esta atividade?")) return;
    try { await persistDelete(id); closeModal(); await loadEvents(); render(); toast("Atividade excluída."); }
    catch (e) { alert("Erro ao excluir: " + e.message); }
  }

  // ---------- Biblioteca (diretórios) ----------
  let libDir = "pitch";
  let libItems = [];

  function libCacheLoad() { try { return JSON.parse(localStorage.getItem(LIB_CACHE_KEY)) || []; } catch (e) { return []; } }
  function libCacheSave(list) { localStorage.setItem(LIB_CACHE_KEY, JSON.stringify(list)); }

  async function libLoad(dir) {
    if (online) {
      try {
        const all = await api("/api/library");
        libCacheSave(all);
        return all.filter(e => e.dir === dir);
      } catch (e) { setOnline(false); }
    }
    return libCacheLoad().filter(e => e.dir === dir);
  }
  async function libSave(entry, id) {
    if (online) {
      try { return await api("/api/library" + (id ? "/" + id : ""), { method: id ? "PUT" : "POST", body: JSON.stringify(entry) }); }
      catch (e) { setOnline(false); }
    }
    const cache = libCacheLoad();
    if (id) { const i = cache.findIndex(e => e.id === id); if (i >= 0) cache[i] = Object.assign(cache[i], entry); else cache.push(entry); }
    else { entry.id = entry.id || uid(); cache.push(entry); }
    libCacheSave(cache); return entry;
  }
  async function libDelete(id) {
    if (online) { try { await api("/api/library/" + id, { method: "DELETE" }); return; } catch (e) { setOnline(false); } }
    libCacheSave(libCacheLoad().filter(e => e.id !== id));
  }

  async function openLibrary(dir) { libDir = dir || libDir; resetLibForm(); el("libOverlay").classList.add("open"); await renderLibrary(); }
  function closeLibrary() { el("libOverlay").classList.remove("open"); }
  function resetLibForm() { el("libEditId").value = ""; el("libNewTitle").value = ""; el("libNewBody").value = ""; el("libFormLabel").textContent = "Incluir novo item"; el("libAdd").textContent = "+ Incluir no diretório"; el("libCancelEdit").classList.add("hidden"); }

  async function renderLibrary() {
    el("libTitle").textContent = "Biblioteca — " + DIR_MAP[libDir].label;
    const tabs = el("libTabs"); tabs.innerHTML = "";
    DIRS.forEach(d => {
      const b = document.createElement("button");
      b.className = "pitch-tab" + (d.id === libDir ? " active" : "");
      b.textContent = d.label;
      b.onclick = () => { libDir = d.id; resetLibForm(); renderLibrary(); };
      tabs.appendChild(b);
    });
    libItems = await libLoad(libDir);
    const c = el("libList");
    if (!libItems.length) { c.innerHTML = '<p style="color:var(--muted)">Nenhum item neste diretório ainda. Inclua o primeiro abaixo.</p>'; return; }
    c.innerHTML = "";
    libItems.forEach(it => {
      const card = document.createElement("div"); card.className = "pp-pitch";
      const head = document.createElement("div"); head.className = "ph";
      const span = document.createElement("span"); span.textContent = it.title;
      const actions = document.createElement("span");
      const mk = (txt, fn) => { const b = document.createElement("button"); b.className = "ghost"; b.style.cssText = "font-size:11px;padding:4px 8px;margin-left:6px"; b.textContent = txt; b.onclick = fn; return b; };
      actions.appendChild(mk("Copiar", (e) => { navigator.clipboard.writeText(it.body || it.title).then(() => { e.target.textContent = "Copiado ✓"; setTimeout(() => e.target.textContent = "Copiar", 1200); }); }));
      actions.appendChild(mk("Editar", () => editLibItem(it)));
      actions.appendChild(mk("Excluir", () => removeLibItem(it)));
      head.appendChild(span); head.appendChild(actions);
      const body = document.createElement("div"); body.className = "pb"; body.style.fontStyle = "normal"; body.style.whiteSpace = "pre-wrap"; body.textContent = it.body || "";
      card.appendChild(head); card.appendChild(body); c.appendChild(card);
    });
  }

  function editLibItem(it) {
    el("libEditId").value = it.id; el("libNewTitle").value = it.title; el("libNewBody").value = it.body || "";
    el("libFormLabel").textContent = "Editar item"; el("libAdd").textContent = "Salvar alterações"; el("libCancelEdit").classList.remove("hidden");
    el("libNewTitle").scrollIntoView({ behavior: "smooth", block: "center" });
  }
  async function removeLibItem(it) {
    if (!confirm("Excluir \"" + it.title + "\" do diretório?")) return;
    await libDelete(it.id); await renderLibrary(); toast("Item excluído.");
  }
  async function addLibItem() {
    const title = el("libNewTitle").value.trim();
    const body = el("libNewBody").value.trim();
    if (!title) { alert("Informe um título."); return; }
    const id = el("libEditId").value;
    await libSave({ id: id || undefined, dir: libDir, title, body }, id || null);
    resetLibForm(); await renderLibrary(); toast("Item salvo no diretório.");
  }

  // Enviar conteúdo de um campo da atividade para um diretório
  async function quickToLib(dir, body) {
    const text = (body || "").trim();
    if (!text) { alert("Preencha o campo antes de salvar na biblioteca."); return; }
    const title = (el("evTitle").value.trim() || DIR_MAP[dir].label.replace(/^[^ ]+ /, "")) + " — " + el("evDate").value;
    await libSave({ dir, title, body: text }, null);
    toast("Salvo em " + DIR_MAP[dir].label + ".");
  }

  // ---------- Navegação ----------
  function setDate(s) { currentDate = s; refresh(); }
  function navStep(dir) {
    if (view === "day") currentDate = shiftDate(currentDate, dir);
    else if (view === "week") currentDate = shiftDate(currentDate, dir * 7);
    else { const d = parseDate(currentDate); d.setMonth(d.getMonth() + dir); currentDate = toStr(d); }
    refresh();
  }
  function setView(v) { view = v; document.querySelectorAll("#viewSwitch button").forEach(b => b.classList.toggle("active", b.dataset.view === v)); refresh(); }
  async function refresh() {
    el("datePicker").value = currentDate;
    el("currentDateLabel").textContent = fmtLong(currentDate);
    el("weekdayLabel").textContent = fmtWeekday(currentDate);
    await loadEvents(); render();
  }

  // ---------- Export / Import ----------
  function exportData() {
    const all = online ? events : loadCache();
    const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "calendario_cobranca_" + todayStr() + ".json"; a.click(); URL.revokeObjectURL(a.href);
  }
  async function importData(file) {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        let data = JSON.parse(reader.result);
        if (!Array.isArray(data)) {
          const flat = []; Object.keys(data).forEach(date => (data[date] || []).forEach(e => flat.push(Object.assign({ date }, e)))); data = flat;
        }
        const replace = !confirm("Mesclar com os dados atuais? (Cancelar substitui tudo)");
        if (online) {
          await api("/api/import", { method: "POST", body: JSON.stringify({ events: data, mode: replace ? "replace" : "merge" }) });
        } else {
          const base = replace ? [] : loadCache();
          data.forEach(e => { if (!e.id) e.id = uid(); base.push(e); }); saveCache(base);
        }
        await loadEvents(); render(); toast("Importação concluída.");
      } catch (e) { alert("Erro ao importar: " + e.message); }
    };
    reader.readAsText(file);
  }

  let toastTimer;
  function toast(msg) { const t = el("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200); }

  // ---------- Init ----------
  function init() {
    CATEGORIES.forEach(c => { const o = document.createElement("option"); o.value = c.id; o.textContent = c.label; el("evCat").appendChild(o); });
    // responsáveis (optgroups)
    ROSTER.forEach(g => {
      const og = document.createElement("optgroup"); og.label = g.group;
      g.names.forEach(n => { const o = document.createElement("option"); o.value = n; o.textContent = n; og.appendChild(o); });
      el("evOwnerPick").appendChild(og);
    });
    el("evOwnerPick").onchange = () => { if (el("evOwnerPick").value) el("evOwner").value = el("evOwnerPick").value; };

    fillHourSelect(el("startHour"), prefs.startHour);
    fillHourSelect(el("endHour"), prefs.endHour);
    el("startHour").onchange = () => { prefs.startHour = Number(el("startHour").value); savePrefs(); render(); };
    el("endHour").onchange = () => { prefs.endHour = Number(el("endHour").value); savePrefs(); render(); };

    el("btnPrev").onclick = () => navStep(-1);
    el("btnNext").onclick = () => navStep(1);
    el("btnToday").onclick = () => setDate(todayStr());
    el("datePicker").onchange = () => setDate(el("datePicker").value);
    document.querySelectorAll("#viewSwitch button").forEach(b => b.onclick = () => setView(b.dataset.view));

    el("btnNew").onclick = () => openModal(null, { date: currentDate, start: pad(prefs.startHour) + ":00" });
    el("btnCloseModal").onclick = closeModal;
    el("btnCancel").onclick = closeModal;
    el("btnSave").onclick = saveEvent;
    el("btnDelete").onclick = deleteEvent;
    el("overlay").onclick = (e) => { if (e.target === el("overlay")) closeModal(); };

    document.querySelectorAll(".lib-open").forEach(b => b.onclick = () => openLibrary(b.dataset.dir));
    el("closeLib").onclick = closeLibrary;
    el("libOverlay").onclick = (e) => { if (e.target === el("libOverlay")) closeLibrary(); };
    el("libAdd").onclick = addLibItem;
    el("libCancelEdit").onclick = resetLibForm;
    el("evPitchToLib").onclick = () => quickToLib("pitch", el("evPitch").value);
    el("evObjToLib").onclick = () => quickToLib("objecao", el("evObjections").value);
    el("evNotesToLib").onclick = () => quickToLib("estrategia", el("evNotes").value);

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeModal(); closeLibrary(); } });

    el("teamFilter").onchange = () => { prefs.teamFilter = el("teamFilter").value; savePrefs(); render(); };
    el("btnExport").onclick = exportData;
    el("btnImport").onclick = () => el("fileImport").click();
    el("fileImport").onchange = (e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ""; };

    renderFilters();
    checkHealth().then(() => setDate(currentDate));
    setInterval(checkHealth, 30000);
  }

  init();
})();
</script>
</body>
</html>
